<title>Landy 陸葉 · 每日简报</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --accent: #1a73e8;
    --accent2: #e87020;
    --text: #e6edf3;
    --muted: #8b949e;
    --tag-ai: #1a3a5c;
    --tag-stock: #2d4a1e;
    --tag-energy: #4a2d1e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
  }

  /* ── 顶栏 ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #1a73e8, #e87020);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-stats { display: flex; gap: 24px; }
  .stat { text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── 主体 ── */
  main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .page-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 36px;
  }

  /* ── 搜索栏 ── */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* ── 年份分组 ── */
  .year-group { margin-bottom: 40px; }
  .year-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── 简报卡片 ── */
  .report-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .report-card:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  .card-date-block {
    min-width: 52px;
    text-align: center;
    background: var(--bg);
    border-radius: 8px;
    padding: 8px 6px;
  }
  .card-month { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .card-day { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .card-weekday { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .card-body { flex: 1; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .card-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-ai { background: var(--tag-ai); color: #7ab3e8; }
  .tag-stock { background: var(--tag-stock); color: #7ac87a; }
  .tag-energy { background: var(--tag-energy); color: #e8a87a; }
  .tag-robot { background: #2d1a4a; color: #c87ae8; }
  .card-arrow {
    color: var(--muted);
    font-size: 18px;
    transition: color 0.2s;
  }
  .report-card:hover .card-arrow { color: var(--accent); }

  /* ── 空状态 ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── 底部 ── */
  footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
