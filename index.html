<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landy 陸葉 · 每日简报</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #2a3548;
    --accent: #3b82f6;
    --accent2: #f97316;
    --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
    --text: #f1f5f9;
    --muted: #64748b;
    --tag-ai: #1e3a5f;
    --tag-stock: #1a3d2e;
    --tag-energy: #4a2d1e;
    --glow: rgba(59, 130, 246, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
  }

  /* ── 顶栏 ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10, 14, 23, 0.85);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent-gradient);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 20px var(--glow);
  }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: 0.5px; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-stats { display: flex; gap: 32px; }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── 主体 ── */
  main { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

  /* ── Tab切换 ── */
  .tab-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 0;
  }
  .tab-btn {
    padding: 12px 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    border-radius: 8px 8px 0 0;
  }
  .tab-btn:hover {
    color: var(--text);
    background: var(--surface2);
  }
  .tab-btn.active {
    color: var(--text);
    background: var(--surface2);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent-gradient);
  }
  .tab-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: 6px;
    font-weight: 700;
  }
  .tab-content {
    display: none;
  }
  .tab-content.active {
    display: block;
  }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .page-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 36px;
  }

  /* ── 搜索栏 ── */
  .search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }
  .search-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* ── 年份分组 ── */
  .year-group { margin-bottom: 40px; }
  .year-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── 简报卡片 ── */
  .report-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .report-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-gradient);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .report-card:hover {
    border-color: var(--accent);
    transform: translateX(6px);
    box-shadow: 0 8px 30px var(--glow);
  }
  .report-card:hover::before { opacity: 0.03; }
  .card-date-block {
    min-width: 56px;
    text-align: center;
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 8px;
    border: 1px solid var(--border);
  }
  .card-month { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 600; }
  .card-day { font-size: 24px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
  .card-weekday { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .card-body { flex: 1; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .card-tags { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .tag-ai { background: var(--tag-ai); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
  .tag-stock { background: var(--tag-stock); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.2); }
  .tag-energy { background: var(--tag-energy); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.2); }
  .tag-robot { background: #2d1a4a; color: #c084fc; border: 1px solid rgba(192, 132, 252, 0.2); }
  .card-arrow {
    color: var(--muted);
    font-size: 22px;
    transition: all 0.2s;
  }
  .report-card:hover .card-arrow { color: var(--accent); transform: translateX(4px); }

  /* ── 空状态 ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── 培训入口卡片 ── */
  .training-banner {
    background: linear-gradient(135deg, #1a1f35 0%, #2d1f4a 50%, #1a2a3a 100%);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    gap: 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .training-banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
  }
  .training-banner:hover {
    border-color: rgba(139, 92, 246, 0.6);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(139, 92, 246, 0.15);
  }
  .training-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #f97316, #ea580c, #dc2626);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
  }
  .training-content { flex: 1; }
  .training-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .training-title span { background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .training-desc { font-size: 13px; color: var(--muted); }
  .training-meta { display: flex; gap: 16px; margin-top: 8px; }
  .training-tag {
    font-size: 11px;
    padding: 3px 10px;
    background: rgba(139, 92, 246, 0.15);
    color: #a78bfa;
    border-radius: 20px;
    font-weight: 500;
  }
  .training-arrow {
    font-size: 24px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .training-banner:hover .training-arrow {
    color: #a78bfa;
    transform: translateX(4px);
  }

  /* ── 底部 ── */
  footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📊</div>
    <div>
      <div class="logo-text">Landy 陸葉 · 每日简报</div>

</header>

<main>
  <!-- Tab导航 -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('briefings')">
      📊 每日简报
      <span class="tab-badge" id="briefing-count">—</span>
    </button>
    <button class="tab-btn" onclick="switchTab('knowledge')">
      📚 知识库
      <span class="tab-badge">2</span>
    </button>
  </div>

  <!-- 每日简报Tab -->
  <div id="tab-briefings" class="tab-content active">
    <div class="page-title">每日简报</div>

    <div class="search-bar">
      <input type="text" id="search-input" placeholder="搜索日期或关键词…" oninput="filterReports()">
    </div>

    <div id="reports-container"></div>

  <!-- 知识库Tab -->
  <div id="tab-knowledge" class="tab-content">

    <div class="page-sub" style="margin-bottom: 20px;">技术培训 · 产品资料 · 行业知识</div>

    <a class="training-banner" href="https://lucylook6-design.github.io/liquid-cooling-training/" target="_blank">
      <div class="training-icon">📚</div>
      <div class="training-content">
        <div class="training-title"><span>液冷技术培训课程</span></div>
        <div class="training-desc">5天系统学习液冷技术，从基础到实战</div>
        <div class="training-meta">
          <span class="training-tag">🔥 Day1-Day5 完整课程</span>
          <span class="training-tag">💧 液冷原理与实践</span>
        </div>
      </div>
      <div class="training-arrow">›</div>
    </a>

    <a class="training-banner" href="reports/cejn-product-inventory.html" target="_blank" style="background: linear-gradient(135deg, #1a2f35 0%, #1f2d4a 50%, #1a2535 100%); border-color: rgba(59, 130, 246, 0.3);">
      <div class="training-icon" style="background: linear-gradient(135deg, #3b82f6, #2563eb, #1d4ed8); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);">🔧</div>
      <div class="training-content">
        <div class="training-title"><span>希恩产品库存</span></div>
        <div class="training-desc">CEJN数据中心液冷快速接头产品目录</div>
        <div class="training-meta">
          <span class="training-tag">📦 UQD/UQDB系列</span>
          <span class="training-tag">✅ OCP标准认证</span>
        </div>
      </div>
      <div class="training-arrow">›</div>
    </a>
  </div>
</main>

<footer>
  Landy 陸葉 · AI研究员简报系统 · 数据仅供参考，不构成投资建议
</footer>

<script>
// ── Tab切换函数 ──
function switchTab(tabName) {
  // 移除所有active类
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  
  // 添加active类到选中的tab
  event.target.classList.add('active');
  document.getElementById('tab-' + tabName).classList.add('active');
}

// ── 简报数据（由 archive.sh 自动更新） ──
const REPORTS = [
  {
    date: "2026-04-25",
    title: "AI研究员简报",
    desc: "<strong>DeepSeek-V4-Pro API限时2.5折优惠 <strong>百度智能云上线DeepSeek-V4�<strong>元戎启行全面转向大模型自动驾驶路线",
    tags: ["ai", "stock", "energy"],
    file: "reports/2026-04-25.html"
  },
  {
    date: "2026-04-24",
    title: "AI研究员--Landy葉的简报",
    desc: "DeepSeek发布V4接口文档 · 霍尔木兹海峡局势升温 · 德州仪器Q2大超预期",
    tags: ["ai", "stock", "energy"],
    file: "reports/2026-04-24.html"
  },
  {
    date: "2026-04-23",
    title: "AI研究员--Landy葉的简报",
    desc: "AI算力需求持续增长 · 液冷技术加速普及 · 新能源市场动态",
    tags: ["ai", "stock", "energy"],
    file: "reports/2026-04-23.html"
  },
  {
    date: "2026-04-22",
    title: "AI研究员--Landy葉的简报",
    desc: "<strong>宁德时代发布第三代神行超充电池 <strong>宁德时代钠离子电池年内大规模量产�<strong>我国软件产业规模有望突破20万亿元大关",
    tags: ["ai", "stock", "energy"],
    file: "reports/2026-04-22.html"
  },
  {
    date: "2026-04-21",
    title: "AI研究员--Landy葉的简报",
    desc: "<strong>金富科技液冷产能扩张 <strong>广东加大算电协同投资�<strong>中东局势推高油价",
    tags: ["ai", "stock", "energy"],
    file: "reports/2026-04-21.html"
  },
  {
    date: "2026-04-20",
    title: "AI研究员--Landy葉的简报",
    desc: "<strong>阿里AI视频模型HappyHorse将于4月27日开放测试 <strong>国际能源署�<strong>沪深两市成交额连续第9个交易日突破2万亿",
    tags: ["ai", "stock", "energy"],
    file: "reports/2026-04-20.html"
  },
  {
    date: "2026-04-19",
    title: "液冷千人大会前瞻 · 英伟达Rubin强制液冷",
    desc: "霍尔木兹封锁冲击能源 · 机器人半马北京举办 · 力源信息Q1净利+240%",
    tags: ["ai", "stock", "energy", "robot"],
    file: "reports/2026-04-19.html"
  }
];

const WEEKDAYS = ["日","一","二","三","四","五","六"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function renderReports(list) {
  const container = document.getElementById("reports-container");
  if (list.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div>没有找到匹配的简报</div></div>`;
    return;
  }

  // 按年分组
  const groups = {};
  list.forEach(r => {
    const year = r.date.split("-")[0];
    if (!groups[year]) groups[year] = [];
    groups[year].push(r);
  });

  let html = "";
  Object.keys(groups).sort((a,b) => b-a).forEach(year => {
    html += `<div class="year-group"><div class="year-label">${year} 年</div>`;
    groups[year].sort((a,b) => b.date.localeCompare(a.date)).forEach(r => {
      const d = new Date(r.date + "T00:00:00");
      const month = MONTHS[d.getMonth()];
      const day = String(d.getDate()).padStart(2,"0");
      const weekday = "周" + WEEKDAYS[d.getDay()];
      const tagHtml = (r.tags||[]).map(t => {
        const map = {ai:"AI·液冷", stock:"二级市场", energy:"储能·新能源", robot:"机器人"};
        return `<span class="tag tag-${t}">${map[t]||t}</span>`;
      }).join("");
      html += `
        <a class="report-card" href="${r.file}" target="_blank">
          <div class="card-date-block">
            <div class="card-month">${month}</div>
            <div class="card-day">${day}</div>
            <div class="card-weekday">${weekday}</div>
          </div>
          <div class="card-body">
            <div class="card-title">${r.title}</div>
            <div class="card-desc">${r.desc}</div>
            <div class="card-tags">${tagHtml}</div>
          </div>
          <div class="card-arrow">›</div>
        </a>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function filterReports() {
  const q = document.getElementById("search-input").value.toLowerCase();
  if (!q) { renderReports(REPORTS); return; }
  const filtered = REPORTS.filter(r =>
    r.date.includes(q) || r.title.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q)
  );
  renderReports(filtered);
}

// 初始化
renderReports(REPORTS);
document.getElementById("total-count").textContent = REPORTS.length;
document.getElementById("briefing-count").textContent = REPORTS.length;
const latest = REPORTS.sort((a,b) => b.date.localeCompare(a.date))[0];
if (latest) {
  const d = new Date(latest.date + "T00:00:00");
  document.getElementById("latest-date").textContent = `${d.getMonth()+1}/${d.getDate()}`;
}
</script>
</body>
</html>
